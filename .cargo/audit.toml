# Cargo audit configuration
# https://github.com/rustsec/rustsec/tree/main/cargo-audit

[advisories]
# All 3 advisories are transitive deps from `ethers 2.0.14` via `digdigdig3`.
# ethers is unmaintained; successor is `alloy`. Migration tracked separately.
# These cannot be fixed without replacing ethers entirely in digdigdig3.

ignore = [
    # paste 1.0.15 — abandoned crate, no patched version exists
    # Chain: paste <- metal <- wgpu-hal <- wgpu (only affects macOS builds)
    # Fix: upstream wgpu/metal need to switch to `pastey` fork
    "RUSTSEC-2024-0436",

    # ring 0.16.20 — unmaintained, superseded by ring 0.17
    # Chain: ring 0.16 <- jsonwebtoken 8.3 <- ethers-providers <- ethers <- digdigdig3
    # Fix: migrate digdigdig3 from ethers to alloy
    "RUSTSEC-2025-0010",

    # rustls-pemfile 1.0.4 — unmaintained, replaced by rustls-pki-types
    # Chain: rustls-pemfile 1.0 <- reqwest 0.11 <- ethers-* <- digdigdig3
    # Fix: migrate digdigdig3 from ethers to alloy (removes reqwest 0.11 dep)
    "RUSTSEC-2025-0134",
]
